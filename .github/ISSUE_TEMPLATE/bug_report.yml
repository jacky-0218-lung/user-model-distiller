name: "Bug report"
description: "Report a reproducible problem using synthetic data only."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not attach real exports, profiles, credentials, or third-party data. Use a minimal synthetic reproduction."
  - type: input
    id: version
    attributes:
      label: "Version or commit"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options:
        - "Import and normalization"
        - "Redaction"
        - "Evidence collection"
        - "Profile validation"
        - "Compilation or deletion"
        - "Skill instructions"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Synthetic reproduction"
      description: "Include the smallest fabricated input and exact command."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: "Privacy confirmation"
      options:
        - label: "I removed all real conversations, credentials, local paths, and personal data."
          required: true
