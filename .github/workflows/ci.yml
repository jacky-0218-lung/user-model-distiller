name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: "Tests and privacy guard"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Check out repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: "Show Python version"
        run: python3 --version
      - name: "Compile Python"
        run: python3 -m compileall -q skills tests tools
      - name: "Run unit tests"
        run: python3 -m unittest discover -s tests -v
      - name: "Run repository privacy guard"
        run: python3 tools/check_repository.py
